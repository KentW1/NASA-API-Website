<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>
    
    <div class="vertical-flex-container">
      <div class="vertical-item">
        <div class="placeholder">
          <div class="placeholder-icon">🔭</div>
          <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
        </div>  
      </div>
      
      <div class="vertical-item">
        <div class="filters">
          <div class="">
            <txt>Start Date</txt>
            <input type="date" id="startDate" />
          </div>

          <div class="">
            <txt>End Date</txt>
            <input type="date" id="endDate" />
          </div>
          
          <button id="getImagesButton" type="button">Get Space Images</button>
        </div>
    </div>
    
    <div id="gallery" class="gallery"></div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
